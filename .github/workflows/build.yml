name: Build Synexia Desktop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Get packages
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows build
        run: |
          cd build/windows/x64/runner/Release
          7z a ../../../../../Synexia-Manager-Windows.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synexia-Manager-Windows
          path: Synexia-Manager-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Get packages
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Zip Linux build
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../Synexia-Manager-Linux.zip .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synexia-Manager-Linux
          path: Synexia-Manager-Linux.zip

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: Synexia-Manager-Windows

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: Synexia-Manager-Linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Synexia Manager v${{ github.run_number }}"
          body: "Build automatique — commit ${{ github.sha }}"
          files: |
            Synexia-Manager-Windows.zip
            Synexia-Manager-Linux.zip
