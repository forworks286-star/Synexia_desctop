workflows:
  android-release:
    name: Synexia Desktop - Android
    environment:
      flutter: 3.44.0
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - forworks286@gmail.com
        notify:
          success: true
          failure: true
